server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }

  # Proxy API calls to the backend service in docker-compose.
  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_set_header Host $host;
  }
}
