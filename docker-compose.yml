services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oximy
      POSTGRES_PASSWORD: oximy
      POSTGRES_DB: oximy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oximy"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://oximy:oximy@db:5432/oximy
      INGEST_TOKEN: ${INGEST_TOKEN:-dev-ingest-token}
      CLAUDE_DIR: /data/claude
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount the real Claude Code data read-only so the collector can scan it.
      - ${HOME}/.claude:/data/claude:ro

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
